# shmig.cfg
# Configuration de shmig — variables shell sourcées au démarrage.
# Les variables d'environnement déjà définies ont priorité sur ce fichier.
#
# Décommenter et adapter les valeurs selon le besoin.

# Répertoire des scripts de migration (*.sh)
# Chemin relatif à la racine du projet
# SHMIG_MIGRATIONS_DIR="shmig.migrations"

# Fichier d'historique des migrations appliquées
# Chemin relatif à la racine du projet
# SHMIG_HISTORY_FILE=".shmig.history"

# Répertoire de verrou (créé/supprimé atomiquement)
# SHMIG_LOCK_DIR=".shmig.lock"